# --- DUMMY BED MACROS ---

[gcode_macro M140]
description: Intercept "Set Bed Temp"
rename_existing: M140.1
gcode:
    # We do nothing here so the heater never turns on
    {% set temp = params.S|default(0) %}
    RESPOND MSG="Ignoring M140 S{temp} (Bed disabled)"

[gcode_macro M190]
description: Intercept "Wait for Bed Temp"
rename_existing: M190.1
gcode:
    # We skip the wait entirely
    {% set temp = params.S|default(0) %}
    RESPOND MSG="Ignoring M190 S{temp} (Bed disabled)"

[gcode_macro SET_HEATER_TEMPERATURE]
description: Intercept modern temp calls
rename_existing: _SET_HEATER_TEMPERATURE_BASE
gcode:
    {% set heater = params.HEATER|default("") %}
    {% if heater == "heater_bed" %}
        RESPOND MSG="Ignoring bed temp request"
    {% else %}
        _SET_HEATER_TEMPERATURE_BASE {rawparams}
    {% endif %}