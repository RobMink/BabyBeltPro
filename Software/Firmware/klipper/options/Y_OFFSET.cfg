[gcode_macro Y_UP_1mm]
gcode:
  {% set new_y = (printer.gcode_move.homing_origin.y + 1.0) | round(3) %}
  RESPOND PREFIX="Notice:" MSG="Y_Offset is now: {new_y}"
  SET_GCODE_OFFSET Y_ADJUST=1.0

