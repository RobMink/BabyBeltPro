[gcode_macro M140]
description: Dummy Bed Temp (No Bed Configured)
gcode:
    {% set temp = params.S|default(0) %}
    RESPOND PREFIX=🔁 MSG="M140 ignored: Target {temp}C"

[gcode_macro M190]
description: Dummy Bed Wait (No Bed Configured)
gcode:
    {% set temp = params.S|default(0) %}
    RESPOND PREFIX=🔁 MSG="M190 ignored: Skipping wait for {temp}C"