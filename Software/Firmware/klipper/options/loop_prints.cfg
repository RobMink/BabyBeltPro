[sdcard_loop]

[gcode_macro M808]
description: Internal loop controller for belt printing
gcode:
    {% if params.L is defined %}
        # CASE 1: Start a new loop (e.g., M808 L20)
        {% set total_loops = params.L|int %}
        SDCARD_LOOP_BEGIN COUNT={total_loops}
        RESPOND PREFIX=🔁 MSG="Loop Started: Printing {total_loops} copies."

    {% elif params.K is defined %}
        # CASE 2: Cancel/Stop the loop (e.g., M808 K1)
        SDCARD_LOOP_DESIST
        RESPOND PREFIX=🔁 MSG="Loop Cancelled."

    {% else %}
        # CASE 3: The End-of-Loop marker (e.g., just M808)
        # This tells Klipper to jump back to the 'BEGIN' marker.
        SDCARD_LOOP_END
        RESPOND PREFIX=🔁 MSG="Iteration complete. Advancing to next part..."
    {% endif %}